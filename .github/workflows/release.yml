name: release

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      version: ${{ steps.changelog.outputs.version }}

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Checkout
        uses: Nessiahs/nuxt-keycloak-oidc/.github/actions/checkout@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: changelog
        uses: ./.github/actions/changelog
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        if: steps.changelog.outputs.version != ''
        uses: ./.github/actions/commit
        env:
            VERSION: ${{ steps.changelog.outputs.version }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          message: "docs(changelog): update changelog [skip ci]"
          branch: docs/changelog-${{ env.VERSION }}
          path: 'CHANGELOG.md'

      - name: Create pr for changelog
        if: steps.changelog.outputs.version != ''
        id: pr
        env:
          VERSION: ${{ steps.changelog.outputs.version }}
        uses: ./.github/actions/pr
        with:
          base: "main"
          head: docs/changelog-${{ steps.changelog.outputs.version }}
          title: "docs(changelog): update changelog for version ${{ steps.changelog.outputs.version }}"
          token: ${{ secrets.PAT_TOKEN }}

      - name: merge pr
        if: steps.changelog.outputs.version != '' && steps.pr.outputs.number != ''
        uses: ./.github/actions/merge
        with:
          token: ${{ secrets.PAT_TOKEN }}
          number: ${{ steps.pr.outputs.number }}

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.version != ''
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Set package version from release
        run: npm pkg set version="${{ needs.release.outputs.version }}"

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build package
        run: npm run prepack

      - name: Publish to npm
        run: npm publish --access public
