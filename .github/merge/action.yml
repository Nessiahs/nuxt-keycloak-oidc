name: "Merge pull request"
description: >
  Composite GitHub Action to merge an approved pull request using the GitHub API.

  This action:
  - Performs a merge via GitHub REST API
  - Uses the "rebase" merge strategy
  - Requires a token with sufficient permissions

inputs:
  token:
    description: >
      GitHub token used to authenticate the merge request.

      Requirements:
      - Must have `pull_requests: write` or `repo` scope
      - Must be allowed to merge the target pull request
    required: true

  number:
    description: >
      Pull request number to be merged.
    required: true

runs:
  using: "composite"
  steps:

    - name: Merge pull request
      shell: "bash"
      env:
        GIT_TOKEN: ${{ inputs.token }}
        PR_NUMBER: ${{ inputs.number }}
      run: |
        set -e

        echo "🔀 Attempting to merge PR #${PR_NUMBER} using rebase strategy"

        response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X PUT \
          -H "Authorization: token ${GIT_TOKEN}" \
          -H "Content-Type: application/json" \
          -d '{"merge_method":"rebase"}' \
          https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}/merge)

        body=$(echo "$response" | sed '$d')
        status=$(echo "$response" | tail -n1 | cut -d: -f2)

        if [[ "$status" != "200" ]]; then
          echo "::error::Failed to merge PR #${PR_NUMBER}"
          echo "$body"
          exit 1
        fi

        echo "✅ PR #${PR_NUMBER} merged successfully"


