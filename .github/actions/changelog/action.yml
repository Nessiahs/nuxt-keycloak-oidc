name: "Create Changelog"
description: >
  Composite GitHub Action to generate a changelog and create a semantic version
  release using semantic-release.

  This action:
  - Generates a version based on commit history (Conventional Commits)
  - Updates / creates a CHANGELOG.md file
  - Tags the repository with the new version
  - Optionally uploads the changelog as an artifact

inputs:
  token:
    description: >
      GitHub token used for authentication.

      Requirements:
      - Must have permissions to push tags and commits
      - Must not be the default GITHUB_TOKEN in restricted environments
      - Should belong to a bot or service account
    required: true

  artifact:
    description: >
      If set to "true", uploads the generated CHANGELOG.md as a workflow artifact.
    required: false
    default: "true"

outputs:
  version:
    description: >
      The generated semantic version (e.g. 1.2.3) determined by semantic-release.
    value: ${{ steps.set_version.outputs.version }}

runs:
  using: "composite"
  steps:

    # -------------------------------------------------------------------------
    # Step 1: Setup Node.js Runtime
    # -------------------------------------------------------------------------
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24.11.1"

    # -------------------------------------------------------------------------
    # Step 2: Configure Git Authentication
    # -------------------------------------------------------------------------
    - name: Configure git remote
      shell: "bash"
      env:
        GIT_TOKEN: ${{ inputs.token }}
      run: |
        set -e

        # Replace origin URL with authenticated endpoint to allow pushing tags
        git remote set-url origin https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

    # -------------------------------------------------------------------------
    # Step 3: Detect Existing package.json
    # -------------------------------------------------------------------------
    - name: Detect existing package files
      id: package_check
      shell: bash
      run: |
        if [ -n "${{ hashFiles('package.json', 'package-lock.json') }}" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    # -------------------------------------------------------------------------
    # Step 4: Remove Existing package.json (Isolation Strategy)
    # -------------------------------------------------------------------------
    - name: Remove existing package files
      if: steps.package_check.outputs.exists == 'true'
      shell: "bash"
      run: |
        set -e

        # Remove existing package definitions to avoid dependency conflicts
        rm -f package.json package-lock.json
        echo "🧹 Removed existing package files to ensure clean release environment"

    # -------------------------------------------------------------------------
    # Step 5: Create Temporary Release Environment
    # -------------------------------------------------------------------------
    - name: Create release package.json
      shell: "bash"
      run: |
        set -e

        # Create minimal package.json with pinned dependencies
        # Ensures deterministic semantic-release execution
        cat <<"EOF" > package.json
        {
          "name": "release-runner",
          "private": true,
          "type": "module",
          "dependencies": {
            "semantic-release": "25.0.2",
            "@semantic-release/changelog": "6.0.3",
            "@semantic-release/release-notes-generator": "14.1.0",
            "@semantic-release/commit-analyzer": "11.0.0",
            "conventional-changelog-conventionalcommits": "9.1.0"
          },
          "release": {
            "branches": ["main", "next"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              [
                "@semantic-release/release-notes-generator",
                {
                  "preset": "conventionalcommits",
                  "presetConfig": {
                    "types": [
                      { "type": "feat", "section": "🚀 Features" },
                      { "type": "fix", "section": "🐛 Fixes" },
                      { "type": "perf", "section": "⚡ Performance" },
                      { "type": "docs", "section": "📚 Documentation" },
                      { "type": "refactor", "section": "🧠 Refactoring" },
                      { "type": "test", "section": "🧪 Tests" },
                      { "type": "build", "section": "🏗 Build System" },
                      { "type": "chore", "section": "🔧 Chores", "hidden": true }
                    ]
                  },
                  "writerOpts": {
                    "groupBy": "type",
                    "commitGroupsSort": ["feat", "fix", "perf", "docs", "refactor", "test", "build", "chore"],
                    "commitsSort": ["scope", "subject"],
                    "noteGroupsSort": "title",
                    "headerPartial": "## 🚀 Version {{version}} ({{date}})\n",
                    "commitPartial": "* {{subject}} ({{hash}})\n",
                    "footerPartial": "{{#if notes}}\n{{#each notes}}\n### ⚠️ {{title}}\n{{text}}\n{{/each}}\n{{/if}}",
                    "mainTemplate": "{{> header}}\n\n{{#each commitGroups}}\n### {{#if title}}{{title}}{{else}}Other Changes{{/if}}\n{{#each commits}}\n{{> commit}}\n{{/each}}\n\n{{/each}}\n{{> footer}}"
                  }
                }
              ],
              [
                "@semantic-release/changelog",
                {
                  "changelogFile": "CHANGELOG.md"
                }
              ]
            ]
          }
        }
        EOF

    # -------------------------------------------------------------------------
    # Step 6: Cache Dependencies
    # -------------------------------------------------------------------------
    - name: Cache node_modules
      id: cached_node_modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: ${{ runner.os }}-semantic-release-${{ hashFiles('package.json') }}

    # -------------------------------------------------------------------------
    # Step 7: Install Dependencies
    # -------------------------------------------------------------------------
    - name: Install dependencies
      if: steps.cached_node_modules.outputs.cache-hit != 'true'
      shell: "bash"
      run: |
        set -e
        npm install

    # -------------------------------------------------------------------------
    # Step 8: Execute Semantic Release
    # -------------------------------------------------------------------------
    - name: Run semantic-release
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      shell: "bash"
      run: |
        set -e

        # Executes version calculation, changelog generation, and tagging
        npx semantic-release | tee release.log

    # -------------------------------------------------------------------------
    # Step 9: Expose Version Output
    # -------------------------------------------------------------------------
    - name: Set version output
      id: set_version
      shell: bash
      run: |
        set -e

        if [ ! -f release.log ]; then
          echo "version=" >> $GITHUB_OUTPUT
          exit 0
        fi

        VERSION=$(grep "Published release" release.log | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')

        if [ -z "$VERSION" ]; then
          echo "version=" >> $GITHUB_OUTPUT
        else
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Released version: $VERSION"
        fi

    # -------------------------------------------------------------------------
    # Step 10: Upload Changelog Artifact
    # -------------------------------------------------------------------------
    - name: Upload changelog artifact
      if: steps.set_version.outputs.version != '' && inputs.artifact != 'false'
      uses: actions/upload-artifact@v6
      with:
        name: changelog
        path: ./CHANGELOG.md
