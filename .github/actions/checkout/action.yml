name: "Checkout repository"
description: >
  Flexible checkout action that resolves the correct branch and repository
  based on the current GitHub event (including pull requests and forks).

inputs:
  token:
    description: "GitHub token used for repository access"
    required: true

outputs:
  branch:
    description: "Resolved branch name"
    value: ${{ steps.context.outputs.branch }}

  repo:
    description: "Resolved repository name"
    value: ${{ steps.context.outputs.repo }}

runs:
  using: "composite"
  steps:

    - name: Resolve checkout context
      id: context
      shell: bash
      env:
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      run: |
        set -e

        if [[ "${{ github.event_name }}" == pull_request* ]]; then
          echo "branch=${PR_HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "repo=${PR_HEAD_REPO}" >> "$GITHUB_OUTPUT"
        else
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Log checkout context
      shell: bash
      run: |
        set -e

        echo "Branch: ${{ steps.context.outputs.branch }}"
        echo "Repository: ${{ steps.context.outputs.repo }}"

    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ steps.context.outputs.branch }}
        repository: ${{ steps.context.outputs.repo }}
        token: ${{ inputs.token }}
        fetch-depth: 0
        persist-credentials: false

    - name: Configure git
      shell: bash
      run: |
        set -e

        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

