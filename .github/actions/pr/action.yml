name: "Create or update pull request"
description: >
  Create a pull request or update it if one already exists for the same head/base.

inputs:
  token:
    description: "GitHub token with pull request permissions"
    required: true

  head:
    description: "Source branch"
    required: true

  base:
    description: "Target branch"
    required: true

  title:
    description: "Pull request title"
    required: true

  body:
    description: "Pull request body"
    required: false
    default: ""

outputs:
  number:
    description: "Pull request number"
    value: ${{ steps.pr.outputs.number }}

runs:
  using: composite
  steps:
    - name: Create or update PR
      id: pr
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
        HEAD: ${{ inputs.head }}
        BASE: ${{ inputs.base }}
        TITLE: ${{ inputs.title }}
        BODY: ${{ inputs.body }}
      run: |
        set -e

        # Check for existing PR
        existing=$(curl -s \
          -H "Authorization: token $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls?head=${GITHUB_REPOSITORY_OWNER}:${HEAD}&base=${BASE}&state=open")

        pr_number=$(echo "$existing" | jq -r '.[0].number')

        # Update existing PR
        if [[ "$pr_number" != "null" ]]; then
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            '{title:$title, body:$body}')

          curl -s -X PATCH \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/$pr_number"

          echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Create new PR
        payload=$(jq -n \
          --arg title "$TITLE" \
          --arg head "$HEAD" \
          --arg base "$BASE" \
          --arg body "$BODY" \
          '{title:$title, head:$head, base:$base, body:$body}')

        response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
          -X POST \
          -H "Authorization: token $TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -d "$payload" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls")

        body=$(echo "$response" | sed '$d')
        status=$(echo "$response" | tail -n1 | cut -d: -f2)

        if [[ "$status" != "201" ]]; then
          echo "::error::Failed to create PR"
          echo "$body"
          exit 1
        fi

        pr_number=$(echo "$body" | jq -r '.number')

        echo "number=$pr_number" >> "$GITHUB_OUTPUT"
