name: "runtime guard"
description: >
  Ensure required CLI tools are available on the runner.

inputs:
  commands:
    description: "Space-separated list of required commands"
    required: true

runs:
  using: composite
  steps:
    - name: Check runtime dependencies
      shell: bash
      run: |
        set -e

        echo "🔍 Checking required tools..."

        for cmd in ${{ inputs.commands }}; do
          if ! command -v "$cmd" >/dev/null 2>&1; then
            echo "❌ Missing: $cmd"
            exit 1
          fi

          echo "✅ $cmd"
        done
